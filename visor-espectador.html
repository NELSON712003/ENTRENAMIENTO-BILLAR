<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 Transmisión Mesa 1 - Viewer</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e94560;
        }
        .header h1 { color: #e94560; font-size: 1.5em; }
        .live-badge {
            background: #e74c3c;
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
        }
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .waiting-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
            padding: 20px;
        }
        .waiting-message .icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* PANEL DE CONEXIÓN SIMPLIFICADO - SIN HISTORIAL */
        .connection-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            min-width: 200px;
            z-index: 100;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f39c12;
            animation: blink 1s infinite;
        }
        .status-dot.connected { background: #27ae60; animation: none; box-shadow: 0 0 10px #27ae60; }
        .status-dot.error { background: #e74c3c; animation: none; }
        .status-dot.connecting { background: #3498db; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Solo muestra estado actual, no historial */
        .current-status {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 5px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }
        
        .peer-id { 
            font-family: monospace; 
            color: #3498db; 
            font-size: 0.75em; 
            word-break: break-all;
            margin-top: 8px;
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }
        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }
        .btn:hover { background: #e94560; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        
        .stats-overlay {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.8em;
            border: 1px solid #333;
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 MESA 1 - Transmisión</h1>
            <div class="live-badge" id="liveBadge">EN VIVO</div>
        </div>

        <div class="video-container">
            <!-- Mensaje de espera -->
            <div class="waiting-message" id="waitingMessage">
                <div class="icon">📡</div>
                <div id="waitingText">Conectando a la transmisión...</div>
            </div>

            <!-- Video -->
            <video id="videoPlayer" autoplay playsinline class="hidden"></video>

            <!-- Panel de conexión SIMPLIFICADO - SIN HISTORIAL -->
            <div class="connection-panel" id="connectionPanel">
                <div class="status-row">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Inicializando...</span>
                </div>
                
                <!-- Solo estado actual, no log histórico -->
                <div class="current-status" id="currentStatus">Esperando conexión...</div>
                
                <div class="peer-id" id="peerId">-</div>
                
                <div class="controls">
                    <button class="btn" onclick="manualReconnect()">🔄 Reconectar</button>
                    <button class="btn" onclick="toggleMute()" id="muteBtn">🔊 Sonido</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-overlay hidden" id="statsOverlay">
                <div>Resolución: <span id="resStat">-</span></div>
            </div>

            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const BROADCASTER_ID = 'mesa1-broadcaster-001';
        const PEER_CONFIG = {
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            debug: 1, // Reducido para menos ruido en consola
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        // ============================================
        // VARIABLES
        // ============================================
        let peer = null;
        let currentCall = null;
        let reconnectAttempts = 0;
        let isConnected = false;
        let dummyStream = null;

        // ============================================
        // ACTUALIZAR ESTADO (solo muestra estado actual, no historial)
        // ============================================
        function updateStatus(text, state = 'connecting') {
            // Actualizar dot y texto principal
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            dot.className = 'status-dot ' + state;
            
            // Actualizar estado secundario (solo el actual)
            document.getElementById('currentStatus').textContent = text;
            
            // Actualizar mensaje central también
            document.getElementById('waitingText').textContent = text;
            
            // Log solo en consola, no en UI
            console.log(`[${state.toUpperCase()}] ${text}`);
        }

        function setPeerId(id) {
            document.getElementById('peerId').textContent = `ID: ${id.substring(0, 12)}...`;
        }

        // ============================================
        // STREAM DUMMY
        // ============================================
        async function createDummyStream() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const dest = audioCtx.createMediaStreamDestination();
                const osc = audioCtx.createOscillator();
                osc.frequency.value = 0;
                osc.connect(dest);
                osc.start();
                
                const canvas = document.createElement('canvas');
                canvas.width = 2;
                canvas.height = 2;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, 2, 2);
                
                const videoStream = canvas.captureStream(1);
                
                return new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...dest.stream.getAudioTracks()
                ]);
            } catch (err) {
                console.error('Error stream dummy:', err);
                const s = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                return s;
            }
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function initPeer() {
            updateStatus('Creando conexión...', 'connecting');
            
            dummyStream = await createDummyStream();

            try {
                peer = new Peer(PEER_CONFIG);

                peer.on('open', (id) => {
                    setPeerId(id);
                    updateStatus('Buscando broadcaster...', 'connecting');
                    setTimeout(connectToBroadcaster, 1000);
                });

                peer.on('error', (err) => {
                    updateStatus(`Error: ${err.type}`, 'error');
                    
                    if (err.type === 'peer-unavailable') {
                        updateStatus('Mesa no disponible, reintentando...', 'connecting');
                        scheduleReconnect();
                    } else if (err.type === 'network') {
                        setTimeout(() => peer.reconnect(), 2000);
                    }
                });

                peer.on('disconnected', () => {
                    updateStatus('Reconectando...', 'connecting');
                    setTimeout(() => {
                        if (peer && !peer.destroyed) peer.reconnect();
                    }, 2000);
                });

            } catch (err) {
                updateStatus('Error de inicio', 'error');
            }
        }

        // ============================================
        // CONEXIÓN
        // ============================================
        function connectToBroadcaster() {
            if (isConnected || !peer || peer.disconnected || !dummyStream) return;

            updateStatus('Conectando a mesa...', 'connecting');

            try {
                const call = peer.call(BROADCASTER_ID, dummyStream);
                if (!call) {
                    scheduleReconnect();
                    return;
                }

                currentCall = call;

                const timeout = setTimeout(() => {
                    if (!isConnected) {
                        call.close();
                        scheduleReconnect();
                    }
                }, 15000);

                call.on('stream', (remoteStream) => {
                    clearTimeout(timeout);
                    handleStreamReceived(remoteStream);
                });

                call.on('close', () => {
                    clearTimeout(timeout);
                    handleDisconnect();
                });

                call.on('error', () => {
                    clearTimeout(timeout);
                    handleDisconnect();
                });

            } catch (err) {
                scheduleReconnect();
            }
        }

        function handleStreamReceived(remoteStream) {
            isConnected = true;
            reconnectAttempts = 0;
            
            const video = document.getElementById('videoPlayer');
            video.srcObject = remoteStream;
            
            video.onloadedmetadata = () => {
                video.play().then(() => {
                    document.getElementById('waitingMessage').classList.add('hidden');
                    video.classList.remove('hidden');
                    updateStatus('✓ Conectado', 'connected');
                    document.getElementById('statsOverlay').classList.remove('hidden');
                    document.getElementById('resStat').textContent = `${video.videoWidth}x${video.videoHeight}`;
                }).catch(() => {
                    document.getElementById('waitingText').innerHTML = 
                        'Haz clic para iniciar<br><button onclick="forcePlay()" style="margin-top:10px;padding:10px 20px;background:#e94560;border:none;color:white;border-radius:5px;cursor:pointer;">▶️ INICIAR</button>';
                });
            };
        }

        function forcePlay() {
            const video = document.getElementById('videoPlayer');
            video.play().then(() => {
                document.getElementById('waitingMessage').classList.add('hidden');
                updateStatus('✓ Conectado', 'connected');
            });
        }

        function handleDisconnect() {
            if (!isConnected) return;
            isConnected = false;
            
            const video = document.getElementById('videoPlayer');
            video.pause();
            video.srcObject = null;
            video.classList.add('hidden');
            
            document.getElementById('waitingMessage').classList.remove('hidden');
            document.getElementById('statsOverlay').classList.add('hidden');
            updateStatus('Desconectado', 'error');
            
            if (currentCall) {
                try { currentCall.close(); } catch(e) {}
                currentCall = null;
            }
            
            scheduleReconnect();
        }

        function scheduleReconnect() {
            reconnectAttempts++;
            const delay = Math.min(3000 * reconnectAttempts, 10000);
            updateStatus(`Reintentando en ${delay/1000}s...`, 'connecting');
            
            setTimeout(() => {
                if (!isConnected) connectToBroadcaster();
            }, delay);
        }

        function manualReconnect() {
            reconnectAttempts = 0;
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            updateStatus('Reconectando manualmente...', 'connecting');
            setTimeout(connectToBroadcaster, 500);
        }

        function toggleMute() {
            const video = document.getElementById('videoPlayer');
            video.muted = !video.muted;
            document.getElementById('muteBtn').textContent = video.muted ? '🔇 Silenciado' : '🔊 Sonido';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ============================================
        // INICIO
        // ============================================
        window.addEventListener('load', initPeer);
        
        document.addEventListener('click', () => {
            const video = document.getElementById('videoPlayer');
            if (video.paused && video.srcObject) video.play().catch(() => {});
        }, { once: true });
    </script>
</body>
</html>
