<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner Sticker Natura</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* STICKER PREVIEW */
        .sticker-container {
            background: #f8f9fa;
            border: 2px dashed #adb5bd;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .sticker-box {
            background: white;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            max-width: 320px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-family: 'Courier New', monospace;
            text-align: left;
        }

        .sticker-barcode-area {
            text-align: center;
            margin-bottom: 8px;
        }

        .barcode-lines {
            height: 40px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px, #000 2px,
                transparent 2px, transparent 3px,
                #000 3px, #000 5px,
                transparent 5px, transparent 6px
            );
            margin-bottom: 4px;
        }

        .barcode-number {
            font-family: Arial, sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .sticker-header-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0 8px 0;
            font-size: 10px;
            font-weight: bold;
            border-bottom: 1.5px solid #000;
            padding-bottom: 4px;
        }

        .sticker-client-name {
            font-size: 11px;
            font-weight: bold;
            margin: 6px 0;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .sticker-address {
            font-size: 9px;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .sticker-city {
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            font-size: 9px;
            margin-top: 6px;
            border-top: 1px solid #000;
            padding-top: 4px;
        }

        .sticker-grid-item {
            display: flex;
            flex-direction: column;
        }

        .sticker-label {
            font-weight: bold;
        }

        .sticker-cb {
            font-size: 12px;
            font-weight: bold;
        }

        /* ESCANER - CORREGIDO */
        .scanner-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            display: none; /* Oculto por defecto */
        }

        .scanner-container.active {
            display: block;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* El video debe verse */
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        .scan-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .scan-btn.scanning {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .scanner-controls {
            display: none;
            gap: 10px;
        }

        .scanner-controls.active {
            display: flex;
        }

        .ctrl-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .ctrl-btn.switch { background: #667eea; color: white; }
        .ctrl-btn.stop { background: #ff4757; color: white; }

        .scan-result {
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .scan-result.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .scan-result-code {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            color: #155724;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulario */
        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #555;
            font-weight: 600;
            font-size: 13px;
        }

        .required { color: #e74c3c; }

        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input.scanned {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .submit-btn:disabled {
            background: #ccc;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #2ed573; color: white; }
        .toast.error { background: #ff4757; color: white; }
        .toast.info { background: #3742fa; color: white; }

        .quick-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .quick-btn {
            flex: 1;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .history-item {
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .history-code {
            font-family: monospace;
            font-weight: bold;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📦 Escáner Sticker</h1>
            <p>Natura/Nmedel - Medellín</p>
        </div>

        <!-- STICKER PREVIEW -->
        <div class="card">
            <div class="card-title">🏷️ Sticker</div>
            <div class="sticker-container">
                <div class="sticker-box" id="stickerPreview">
                    <div class="sticker-barcode-area">
                        <div class="barcode-lines"></div>
                        <div class="barcode-number" id="previewBarcode">10016026559322</div>
                    </div>
                    
                    <div class="sticker-header-row">
                        <span>CICLO: <b id="previewCiclo">05</b></span>
                        <span>SECTOR: <b id="previewSector">0280</b></span>
                        <span>NMEDEL</span>
                    </div>
                    
                    <div class="sticker-client-name" id="previewNombre">
                        MARIA FERNANDA CARDONA OCAMPO
                    </div>
                    
                    <div class="sticker-address" id="previewDireccion">
                        KR 40 # 20 DB-36-CASTROPOL<br>
                        CASA SEGUNDO PISO-CANCHA DE POLVO
                    </div>
                    
                    <div class="sticker-city" id="previewCiudad">MEDELLIN</div>
                    
                    <div class="sticker-grid">
                        <div class="sticker-grid-item">
                            <span class="sticker-label">Tel:</span>
                            <span id="previewTel">3148228973</span>
                        </div>
                        <div class="sticker-grid-item">
                            <span class="sticker-label">Cajas:</span>
                            <span id="previewCajas">2</span>
                        </div>
                        <div class="sticker-grid-item sticker-cb">
                            <span class="sticker-label">CB:</span>
                            <span id="previewCB">440651</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ESCANER -->
        <div class="card">
            <div class="card-title">📷 Escanear Código</div>
            
            <!-- Contenedor del escáner - IMPORTANTE: debe estar visible antes de iniciar -->
            <div class="scanner-container" id="scannerContainer">
                <div id="reader"></div>
            </div>

            <button class="scan-btn" id="scanBtn" onclick="toggleScan()">
                <span>📷</span>
                <span id="scanText">Iniciar Cámara</span>
            </button>

            <div class="scanner-controls" id="scannerControls">
                <button class="ctrl-btn switch" onclick="switchCamera()">🔄 Cambiar Cámara</button>
                <button class="ctrl-btn stop" onclick="stopScan()">⏹ Detener</button>
            </div>

            <div class="scan-result" id="scanResult">
                <div style="font-size: 12px; color: #155724; margin-bottom: 5px;">✅ Código detectado</div>
                <div class="scan-result-code" id="resultCode">-</div>
            </div>
        </div>

        <!-- FORMULARIO -->
        <div class="card">
            <div class="card-title">📝 Datos</div>
            
            <form id="mainForm">
                <div class="form-group">
                    <label>Código Barras <span class="required">*</span></label>
                    <input type="text" id="codigoBarras" readonly required placeholder="Presiona 'Iniciar Cámara' y escanea">
                </div>

                <div class="form-group">
                    <label>Código Cliente (CB) <span class="required">*</span></label>
                    <input type="text" id="codigoCliente" required placeholder="Ej: 440651">
                </div>

                <div class="form-group">
                    <label>Nombre Cliente <span class="required">*</span></label>
                    <input type="text" id="nombreCliente" required placeholder="Nombre completo">
                </div>

                <div class="form-group">
                    <label>Dirección <span class="required">*</span></label>
                    <input type="text" id="direccionCliente" required placeholder="Dirección completa">
                </div>

                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" placeholder="Ej: 3148228973">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Ciclo</label>
                        <input type="text" id="ciclo" placeholder="Ej: 05">
                    </div>
                    <div class="form-group">
                        <label>Sector</label>
                        <input type="text" id="sector" placeholder="Ej: 0280">
                    </div>
                </div>

                <div class="form-group">
                    <label>Cajas</label>
                    <input type="text" id="cajas" placeholder="Ej: 2">
                </div>

                <div class="quick-btns">
                    <button type="button" class="quick-btn" onclick="loadExample()">📝 Cargar Ejemplo</button>
                    <button type="button" class="quick-btn" onclick="clearForm()">🗑️ Limpiar</button>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    📤 Enviar a Google Sheets
                </button>
            </form>
        </div>

        <!-- HISTORIAL -->
        <div class="card">
            <div class="card-title">📋 Historial (<span id="count">0</span>)</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwloBDsFGmEyByoRmMsKK3vFEqCl8PJYvwxRJ4_4IskcKMUgDFu7d2CEGVxUZPO_iXkwQ/exec';
        
        let html5QrCode = null;
        let isScanning = false;
        let currentCamera = 'environment'; // 'environment' = trasera, 'user' = frontal
        let history = JSON.parse(localStorage.getItem('stickerHistory')) || [];

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            updateHistory();
            updatePreview();
            
            // Listeners para preview en tiempo real
            ['codigoBarras', 'codigoCliente', 'nombreCliente', 'direccionCliente', 
             'telefono', 'ciclo', 'sector', 'cajas'].forEach(id => {
                document.getElementById(id)?.addEventListener('input', updatePreview);
            });
        });

        // ==========================================
        // FUNCIONES DEL ESCÁNER - CORREGIDAS
        // ==========================================
        
        async function toggleScan() {
            if (isScanning) {
                stopScan();
                return;
            }

            const container = document.getElementById('scannerContainer');
            const btn = document.getElementById('scanBtn');
            const btnText = document.getElementById('scanText');
            const controls = document.getElementById('scannerControls');

            try {
                // PRIMERO mostrar el contenedor (IMPORTANTE)
                container.classList.add('active');
                
                // Pequeña espera para que el DOM se actualice
                await new Promise(resolve => setTimeout(resolve, 100));
                
                // Crear instancia del escáner
                html5QrCode = new Html5Qrcode("reader");
                
                // Configuración optimizada para códigos de barras
                const config = {
                    fps: 10,
                    qrbox: { width: 280, height: 100 },
                    aspectRatio: 2.5,
                    disableFlip: false,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.CODABAR,
                        Html5QrcodeSupportedFormats.ITF
                    ]
                };

                // Iniciar cámara
                await html5QrCode.start(
                    { facingMode: currentCamera },
                    config,
                    onScanSuccess,
                    onScanFailure
                );

                // Éxito - actualizar UI
                isScanning = true;
                btn.classList.add('scanning');
                btnText.textContent = 'Detener Cámara';
                controls.classList.add('active');
                
                showToast('📷 Cámara activada. Apunta al código de barras', 'info');

            } catch (err) {
                console.error('Error al iniciar cámara:', err);
                
                // Ocultar contenedor si falla
                container.classList.remove('active');
                
                let errorMsg = 'Error al acceder a la cámara';
                
                if (err.name === 'NotAllowedError') {
                    errorMsg = '❌ Permiso de cámara denegado. Habilita permisos en configuración.';
                } else if (err.name === 'NotFoundError') {
                    errorMsg = '❌ No se encontró cámara disponible';
                } else if (err.name === 'NotReadableError') {
                    errorMsg = '❌ La cámara está siendo usada por otra app';
                }
                
                showToast(errorMsg, 'error');
            }
        }

        function stopScan() {
            const container = document.getElementById('scannerContainer');
            const btn = document.getElementById('scanBtn');
            const btnText = document.getElementById('scanText');
            const controls = document.getElementById('scannerControls');

            if (html5QrCode && isScanning) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    console.log('Escáner detenido');
                }).catch(err => {
                    console.error('Error al detener:', err);
                });
            }

            isScanning = false;
            container.classList.remove('active');
            btn.classList.remove('scanning');
            btnText.textContent = 'Iniciar Cámara';
            controls.classList.remove('active');
        }

        async function switchCamera() {
            if (!isScanning) return;
            
            // Detener actual
            stopScan();
            
            // Cambiar cámara
            currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
            
            // Esperar un poco y reiniciar
            setTimeout(() => {
                toggleScan();
            }, 500);
            
            showToast(`🔄 Cambiando a cámara ${currentCamera === 'environment' ? 'trasera' : 'frontal'}...`, 'info');
        }

        function onScanSuccess(decodedText, decodedResult) {
            console.log('Código detectado:', decodedText);
            
            // Evitar duplicados inmediatos
            const lastCode = document.getElementById('codigoBarras').value;
            if (lastCode === decodedText) return;
            
            // Actualizar campos
            const input = document.getElementById('codigoBarras');
            input.value = decodedText;
            input.classList.add('scanned');
            
            // Mostrar resultado
            document.getElementById('resultCode').textContent = decodedText;
            document.getElementById('scanResult').classList.add('show');
            
            // Actualizar preview del sticker
            updatePreview();
            
            // Notificación
            showToast(`✅ Código: ${decodedText}`, 'success');
            
            // Vibración en móvil
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
            
            // Auto-focus al siguiente campo
            setTimeout(() => {
                document.getElementById('codigoCliente').focus();
            }, 300);
            
            // Opcional: detener escáner después de leer
            // setTimeout(stopScan, 1000);
        }

        function onScanFailure(error) {
            // Ignorar errores normales de escaneo
        }

        // ==========================================
        // PREVIEW Y FORMULARIO
        // ==========================================
        
        function updatePreview() {
            const getVal = (id, def) => document.getElementById(id)?.value || def;
            
            document.getElementById('previewBarcode').textContent = getVal('codigoBarras', '10016026559322');
            document.getElementById('previewCiclo').textContent = getVal('ciclo', '05');
            document.getElementById('previewSector').textContent = getVal('sector', '0280');
            document.getElementById('previewNombre').textContent = getVal('nombreCliente', 'MARIA FERNANDA CARDONA OCAMPO').toUpperCase();
            document.getElementById('previewDireccion').innerHTML = getVal('direccionCliente', 'KR 40 # 20 DB-36-CASTROPOL\nCASA SEGUNDO PISO-CANCHA DE POLVO').replace(/\n/g, '<br>');
            document.getElementById('previewCiudad').textContent = 'MEDELLIN';
            document.getElementById('previewTel').textContent = getVal('telefono', '3148228973');
            document.getElementById('previewCajas').textContent = getVal('cajas', '2');
            document.getElementById('previewCB').textContent = getVal('codigoCliente', '440651');
        }

        // Envío a Google Sheets
        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            
            const data = {
                codigoBarras: document.getElementById('codigoBarras').value,
                codigoCliente: document.getElementById('codigoCliente').value,
                nombreCliente: document.getElementById('nombreCliente').value,
                direccionCliente: document.getElementById('direccionCliente').value,
                telefono: document.getElementById('telefono').value,
                ciclo: document.getElementById('ciclo').value,
                sector: document.getElementById('sector').value,
                cajas: document.getElementById('cajas').value,
                fecha: new Date().toLocaleString('es-CO')
            };

            // Validación
            if (!data.codigoBarras || !data.codigoCliente || !data.nombreCliente || !data.direccionCliente) {
                showToast('⚠️ Completa todos los campos obligatorios (*)', 'error');
                return;
            }

            // Loading
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Guardar en historial
                history.unshift(data);
                if (history.length > 20) history.pop();
                localStorage.setItem('stickerHistory', JSON.stringify(history));
                updateHistory();

                showToast('✅ ¡Enviado a Google Sheets!', 'success');
                
                // Limpiar formulario
                clearForm();
                
            } catch (err) {
                console.error(err);
                showToast('❌ Error al enviar. Intenta de nuevo.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 Enviar a Google Sheets';
            }
        });

        function loadExample() {
            document.getElementById('codigoBarras').value = '10016026559322';
            document.getElementById('codigoCliente').value = '440651';
            document.getElementById('nombreCliente').value = 'Maria Fernanda Cardona Ocampo';
            document.getElementById('direccionCliente').value = 'KR 40 # 20 DB-36-CASTROPOL, Casa segundo piso';
            document.getElementById('telefono').value = '3148228973';
            document.getElementById('ciclo').value = '05';
            document.getElementById('sector').value = '0280';
            document.getElementById('cajas').value = '2';
            document.getElementById('codigoBarras').classList.add('scanned');
            updatePreview();
            showToast('📝 Datos de ejemplo cargados', 'info');
        }

        function clearForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('codigoBarras').classList.remove('scanned');
            document.getElementById('scanResult').classList.remove('show');
            updatePreview();
        }

        function updateHistory() {
            document.getElementById('count').textContent = history.length;
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">Sin registros aún</div>';
                return;
            }
            
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <div class="history-code">${h.codigoBarras}</div>
                    <div>${h.nombreCliente} • CB: ${h.codigoCliente}</div>
                    <div style="color:#999;font-size:11px;">${h.fecha}</div>
                </div>
            `).join('');
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
